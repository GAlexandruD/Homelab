apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metabase
spec:
  ingressClassName: traefik
  rules:
    - host: metabase-adstage.alexandrud.com
      http:
        paths:
          - backend:
              service:
                name: metabase
                port:
                  number: 3000
            path: /
            pathType: Prefix
