apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-on-docker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextjs-on-docker
  template:
    metadata:
      labels:
        app: nextjs-on-docker
    spec:
      securityContext:
        fsGroup: 1001
        runAsUser: 1001 #  nextjs user ID
        runAsGroup: 1001 # nodejs group ID

      containers:
        - name: nextjs-on-docker
          image: docker.io/galexandrud/nextjs-on-docker:0.0.5
          ports:
            - name: http
              containerPort: 3000

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          envFrom:
            #- configMapRef:
            #    name: linkding-configmap
            #- secretRef:
            #    name: audiobookshelf-container-env

          securityContext:
            allowPrivilegeEscalation: false

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # volumeMounts:
          #   # Don't need it as I don't save files.
          #   - name: nextjs-on-docker-app
          #     mountPath: /appNOTUSED

      # volumes:
      #   - name: nextjs-on-docker-app
      #     persistentVolumeClaim:
      #       claimName: nextjs-on-docker-app-pvc
