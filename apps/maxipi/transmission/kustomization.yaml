apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: transmission
resources:
  - ../../_base/transmission
patches:
  - target:
      kind: Deployment
      name: transmission
    patch: |
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
      - op: replace
        path: /spec/template/spec/containers/0/ports
        value:
          - containerPort: 9091
            hostPort: 9091
            name: web
            protocol: TCP
          - containerPort: 51413
            hostPort: 51413
            name: tcp
            protocol: TCP
          - containerPort: 51413
            hostPort: 51413
            name: udp
            protocol: UDP
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: transmission-config-pvc
      spec:
        storageClassName: nfs-csi-v3
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: transmission-downloads-pvc
      spec:
        storageClassName: nfs-csi-v3
  - patch: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: transmission-watch-pvc
      spec:
        storageClassName: nfs-csi-v3
