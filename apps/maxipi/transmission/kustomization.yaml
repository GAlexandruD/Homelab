apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: transmission
resources:
  - ../../_base/transmission
  - pv.yaml
images:
  - name: lscr.io/linuxserver/transmission
    newTag: "4.1.3"
patches:
  - target:
      kind: Deployment
      name: transmission
    patch: |
      - op: replace
        path: /spec/strategy
        value:
          type: Recreate
      - op: replace
        path: /spec/template/spec/containers/0/ports
        value:
          - containerPort: 9091
            hostPort: 9091
            name: web
            protocol: TCP
          - containerPort: 51413
            hostPort: 51413
            name: tcp
            protocol: TCP
          - containerPort: 51413
            hostPort: 51413
            name: udp
            protocol: UDP
  - patch: |-
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: transmission-config-pvc
        namespace: transmission
      spec:
        storageClassName: ""
        volumeName: transmission-config-maxipi
  - patch: |-
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: transmission-downloads-pvc
        namespace: transmission
      spec:
        storageClassName: ""
        volumeName: transmission-downloads-maxipi
  - patch: |-
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: transmission-watch-pvc
        namespace: transmission
      spec:
        storageClassName: ""
        volumeName: transmission-watch-maxipi
