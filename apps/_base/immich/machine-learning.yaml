apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-machine-learning
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-machine-learning
  template:
    metadata:
      labels:
        app: immich-machine-learning
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "find /cache \\( ! -user 1000 -o ! -group 1000 \\) -exec chown 1000:1000 {} +"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: model-cache
              mountPath: /cache
      containers:
        - name: immich-machine-learning
          image: ghcr.io/immich-app/immich-machine-learning:v3.0.2
          env:
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: /cache
          ports:
            - name: http
              containerPort: 3003
          volumeMounts:
            - name: model-cache
              mountPath: /cache
            - name: tmp
              mountPath: /tmp
            - name: home-cache
              mountPath: /.cache
            - name: home-config
              mountPath: /.config
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 4000m
              memory: 2Gi
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: immich-ml-cache-pvc
        - name: tmp
          emptyDir: {}
        - name: home-cache
          emptyDir: {}
        - name: home-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: immich-machine-learning
spec:
  selector:
    app: immich-machine-learning
  ports:
    - name: http
      port: 3003
      targetPort: 3003
