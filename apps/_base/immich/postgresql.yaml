apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich-postgresql
spec:
  replicas: 1
  serviceName: immich-postgresql
  selector:
    matchLabels:
      app: immich-postgresql
  template:
    metadata:
      labels:
        app: immich-postgresql
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /data"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: postgresql-data
              mountPath: /data
      containers:
        - name: postgresql
          image: ghcr.io/immich-app/postgres:16-vectorchord0.4.3-pgvectors0.2.0
          env:
            - name: POSTGRES_DB
              value: immich
            - name: POSTGRES_USER
              value: immich
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
              name: postgresql
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/postgresql
            - name: etc-postgresql
              mountPath: /etc/postgresql
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U immich"]
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U immich"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2536Mi
      volumes:
        - name: postgresql-data
          persistentVolumeClaim:
            claimName: immich-postgresql-pvc
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: etc-postgresql
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: immich-postgresql
spec:
  selector:
    app: immich-postgresql
  ports:
    - port: 5432
      targetPort: 5432
