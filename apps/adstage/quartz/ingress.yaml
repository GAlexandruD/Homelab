apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quartz
spec:
  ingressClassName: traefik
  rules:
    - host: blog-adstage.alexandrud.com
      http:
        paths:
          - backend:
              service:
                name: quartz
                port:
                  number: 8080
            path: /
            pathType: Prefix
