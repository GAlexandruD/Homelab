apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - audiobookshelf
  - commafeed
  - homepage
  - linkding
  - metabase
  - n8n
  - nextjs-on-docker
  - transmission
  - uptimekuma
  - wallabag
  - quartz
  - minio
patches:
  # Temporary: existing adstage PVCs were created with local-path before the
  # standard StorageClass abstraction. storageClassName is immutable on bound
  # PVCs. This patch will be removed after PVCs are recreated with standard.
  - target:
      kind: PersistentVolumeClaim
    patch: |
      - op: replace
        path: /spec/storageClassName
        value: local-path
