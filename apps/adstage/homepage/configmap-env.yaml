apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-env-configmap
data:
  HOMEPAGE_ALLOWED_HOSTS: "homepage-adstage.alexandrud.com:3000,homepage-adstage.alexandrud.com"
  service.yaml: |
    ---
    # For configuration options and examples, please see:
    # https://gethomepage.dev/configs/services/

    - adstage:
        - Quartz:
            href: https://blog-adstage.alexandrud.com/
            description: Blog running on Quartz
            icon: blogger
        - N8n:
            href: https://n8n-adstage.alexandrud.com/
            description: Great automations
            icon: n8n
        - Linkding:
            href: https://linkding-adstage.alexandrud.com/
            description: Bookmarks
            icon: linkding
        - Audiobookshelf:
            href: https://audiobookshelf-adstage.alexandrud.com/
            description: Audio books.
            icon: audiobookshelf
        - Commafeed:
            href: https://commafeed-adstage.alexandrud.com/
            description: RSS feed.
            icon: commafeed
        - NextJS-App:
            href: https://nextjs-on-docker-adstage.alexandrud.com/
            description: A NextJS app.
            icon: nextjs
        - Metabase:
            href: https://metabase-adstage.alexandrud.com/
            description:  Query, visualize, and analyze data.
            icon: metabase

    - Monitoring:
        - Adstage - UptimeKuma:
            href: https://uptimekuma-adstage.alexandrud.com/status/adstage
            description: Monitors connectivity
            icon: uptime-kuma
            widget:
              type: uptimekuma
              url: https://uptimekuma-adstage.alexandrud.com
              slug: adstage

        - GrafanaMonitoring:
            href: https://grafana-adstage.alexandrud.com/public-dashboards/42f78c614ade459cabf8c235e2b14819
            description: Monitoring
            icon: grafana

    - Currently Disabled:
        - Wallabag:
            #href: https://wallabag-adstage.alexandrud.com/
            description: Read later.
            icon: wallabag
