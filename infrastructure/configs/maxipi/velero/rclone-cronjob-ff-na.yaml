apiVersion: batch/v1
kind: CronJob
metadata:
  name: rclone-offsite-sync-ff-na
  namespace: velero
spec:
  schedule: "0 23 * * *"
  timeZone: "Europe/Bucharest"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: rclone
              image: rclone/rclone:1.74.3
              command:
                - /bin/sh
                - -c
                - |
                  mkdir -p /tmp/rclone
                  FF_NA_OBSCURED=$(rclone obscure "${FOLDERFORT_NA_PASSWORD}")
                  cat > /tmp/rclone/rclone.conf << EOF
                  [minio]
                  type = s3
                  provider = Minio
                  endpoint = http://minio.minio.svc.cluster.local:9000
                  access_key_id = ${MINIO_ACCESS_KEY_ID}
                  secret_access_key = ${MINIO_SECRET_ACCESS_KEY}

                  [ff-na]
                  type = webdav
                  url = ${FOLDERFORT_NA_URL}
                  vendor = other
                  user = ${FOLDERFORT_USER}
                  pass = ${FF_NA_OBSCURED}

                  EOF
                  rclone copy minio:velero ff-na:velero-maxipi --config /tmp/rclone/rclone.conf --tpslimit 2 --checkers 1 --transfers 1 --progress
              env:
                - name: HOME
                  value: /tmp
                - name: MINIO_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: MINIO_ACCESS_KEY_ID
                - name: MINIO_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: MINIO_SECRET_ACCESS_KEY
                - name: FOLDERFORT_USER
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: FOLDERFORT_USER
                - name: FOLDERFORT_NA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: FOLDERFORT_NA_PASSWORD
                - name: FOLDERFORT_NA_URL
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: FOLDERFORT_NA_URL
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
