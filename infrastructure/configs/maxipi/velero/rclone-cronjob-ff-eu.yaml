apiVersion: batch/v1
kind: CronJob
metadata:
  name: rclone-offsite-sync-ff-eu
  namespace: velero
spec:
  schedule: "0 23 * * *"
  timeZone: "Europe/Bucharest"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          containers:
            - name: rclone
              image: rclone/rclone:1.74.4
              command:
                - /bin/sh
                - -c
                - |
                  mkdir -p /tmp/rclone
                  FF_EU_OBSCURED=$(rclone obscure "${FOLDERFORT_EU_PASSWORD}")
                  cat > /tmp/rclone/rclone.conf << EOF
                  [minio]
                  type = s3
                  provider = Minio
                  endpoint = http://minio.minio.svc.cluster.local:9000
                  access_key_id = ${MINIO_ACCESS_KEY_ID}
                  secret_access_key = ${MINIO_SECRET_ACCESS_KEY}

                  [ff-eu]
                  type = webdav
                  url = ${FOLDERFORT_EU_URL}
                  vendor = other
                  user = ${FOLDERFORT_USER}
                  pass = ${FF_EU_OBSCURED}

                  EOF
                  rclone copy minio:velero ff-eu:velero-maxipi --config /tmp/rclone/rclone.conf --tpslimit 2 --checkers 1 --transfers 1 --progress
              env:
                - name: HOME
                  value: /tmp
                - name: MINIO_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: MINIO_ACCESS_KEY_ID
                - name: MINIO_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: MINIO_SECRET_ACCESS_KEY
                - name: FOLDERFORT_USER
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: FOLDERFORT_USER
                - name: FOLDERFORT_EU_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: FOLDERFORT_EU_PASSWORD
                - name: FOLDERFORT_EU_URL
                  valueFrom:
                    secretKeyRef:
                      name: rclone-credentials
                      key: FOLDERFORT_EU_URL
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
