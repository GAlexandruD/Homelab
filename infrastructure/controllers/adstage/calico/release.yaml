apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tigera-operator
  namespace: tigera-operator
spec:
  interval: 30m
  chart:
    spec:
      # renovate: datasource=helm registryUrl=https://projectcalico.docs.tigera.io/charts
      chart: tigera-operator
      version: "v3.31.5"
      sourceRef:
        kind: HelmRepository
        name: tigera-operator
        namespace: tigera-operator
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
