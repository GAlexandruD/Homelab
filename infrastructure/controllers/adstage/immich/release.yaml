apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: immich
spec:
  interval: 30m
  chart:
    spec:
      # renovate: datasource=helm registryUrl=https://immich-app.github.io/immich-charts
      chart: immich
      version: "0.12.0"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: immich
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    env:
      IMMICH_TRUSTED_PROXIES: "0.0.0.0/0"
    envFrom:
      - secretRef:
          name: immich-secrets

    immich:
      persistence:
        library:
          existingClaim: immich-library-pvc

    machine-learning:
      enabled: true
      persistence:
        cache:
          enabled: true
          storageClass: standard
          size: 20Gi

    postgresql:
      enabled: true
      image:
        repository: ghcr.io/immich-app/postgres
        tag: "14-vectorchk0.3.0"
      auth:
        database: immich
        username: immich
        existingSecret: immich-db-secret
        secretKeys:
          userPasswordKey: password
      primary:
        persistence:
          storageClass: standard
          size: 10Gi

    redis:
      enabled: true
      architecture: standalone
      auth:
        enabled: false
