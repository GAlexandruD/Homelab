apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 30m
  chart:
    spec:
      # renovate: datasource=helm registryUrl=https://pkgs.tailscale.com/helmcharts
      chart: tailscale-operator
      version: "1.98.4"
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: tailscale
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    operatorConfig:
      defaultTags:
        - tag:k8s
    oauth:
      existingSecretName: operator-oauth
