apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      # renovate: datasource=helm registryUrl=https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      version: "83.6.0"
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
      # Ignore "validated" annotation which is not inserted during install
      - paths: ["/metadata/annotations/prometheus-operator-validated"]
        target:
          kind: PrometheusRule
  values:
    grafana:
      persistence:
        enabled: true
        size: 1Gi
        storageClassName: standard
      initChownData:
        enabled: false  # Disabled: runs as root on every start, only needed once. On cluster recreation, manually chown the PVC path to 472:472 before starting Grafana.
      sidecar:
        datasources:
          skipReload: false
      admin:
        existingSecret: grafana-admin-secret
        userKey: adminUser
        passwordKey: adminPassword
